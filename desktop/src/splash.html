<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8eaed;
      -webkit-app-region: drag;
      user-select: none;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #185FA5;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 32px; }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid #1e2028;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">10x</div>
  <h1>10x Chat</h1>
  <p>10x Digital Ventures</p>
  <div class="spinner"></div>
</body>
</html>
